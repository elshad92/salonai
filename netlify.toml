[build]
  publish = "dist"
  command = "npm run build"

# SUPABASE_SERVICE_KEY and GEMINI_KEY must be set in Netlify Dashboard (not here — they are secrets).
# VITE_SUPABASE_ANON_KEY is a publishable key protected by RLS — safe to bake into the bundle.
[build.environment]
  SUPABASE_URL          = "https://dditnfupklbqiauzuehw.supabase.co"
  VITE_SUPABASE_URL     = "https://dditnfupklbqiauzuehw.supabase.co"
  VITE_SUPABASE_ANON_KEY = "sb_publishable_ZgBZvrK0HN5mU_lf5n7zCg_cqZ_WYoT"

[functions]
  directory        = "netlify/functions"
  node_bundler     = "esbuild"
  included_files   = ["netlify/functions/**"]

# Scheduled reminder job — runs every hour
[functions."whatsapp-reminders"]
  schedule = "0 * * * *"

# Route /api/* to Netlify Functions (clean URLs for webhook config)
[[redirects]]
  from   = "/api/:func"
  to     = "/.netlify/functions/:func"
  status = 200

# SPA fallback — must be last
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "DENY"
    X-Content-Type-Options     = "nosniff"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://generativelanguage.googleapis.com https://accounts.google.com https://api.telegram.org; frame-src https://accounts.google.com; font-src 'self' data:;"
